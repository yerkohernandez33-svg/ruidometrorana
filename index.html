<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ruidómetro Rana 🐸</title>

<style>
  body {
    text-align: center;
    font-family: Arial;
    background: #e8f5e9;
  }

  #frog {
    width: 150px;
    position: relative;
    top: 0;
    transition: all 0.3s ease;
  }

  #bar {
    width: 300px;
    height: 20px;
    background: lightgray;
    margin: 20px auto;
    border-radius: 10px;
    overflow: hidden;
  }

  #level {
    height: 100%;
    width: 0%;
    background: green;
  }

  #msg {
    font-size: 20px;
    font-weight: bold;
  }
</style>
</head>

<body>

<h1>🐸 Protege a la rana</h1>

<button id="startBtn">Iniciar</button>

<br><br>

<img id="frog" src="rana1.png">

<div id="bar">
  <div id="level"></div>
</div>

<p id="msg">Presiona iniciar</p>

<h2 id="contador">Silencio: 0s</h2>

<button id="benitoBtn" style="display:none;">🚨 Llamar a Benito</button>

<audio id="croac" src="croac.mp3"></audio>

<script>
document.getElementById("startBtn").onclick = function() {

  navigator.mediaDevices.getUserMedia({ audio: true })
  .then(function(stream) {

    const audioContext = new AudioContext();
    const mic = audioContext.createMediaStreamSource(stream);
    const analyser = audioContext.createAnalyser();
    mic.connect(analyser);

    const data = new Uint8Array(analyser.frequencyBinCount);

    let frog = document.getElementById("frog");
    let levelBar = document.getElementById("level");
    let msg = document.getElementById("msg");
    let croacSound = document.getElementById("croac");
    let contador = document.getElementById("contador");
    let benitoBtn = document.getElementById("benitoBtn");

    let nivel = 1;
    let tiempoSilencio = 0;
    let jugando = true;
    let sonidoYa = false;

    // 🧊 CONTROL DE FREEZE
    let congelado = false;
    let tiempoFreeze = 0;

    function update() {

      analyser.getByteFrequencyData(data);
      let volume = data.reduce((a,b) => a+b) / data.length;

      levelBar.style.width = Math.min(volume,100) + "%";

      if (!jugando) return;

      // 🧊 SI ESTÁ CONGELADO
      if (congelado) {
        tiempoFreeze -= 0.016;

        contador.innerText = "⏳ Espera: " + tiempoFreeze.toFixed(1) + "s";

        if (tiempoFreeze <= 0) {
          congelado = false;
        }

        requestAnimationFrame(update);
        return;
      }

      // 🔊 SUBE NIVEL
      if (volume > 70 && nivel < 4) {
        nivel++;
        tiempoSilencio = 0;

        // ACTIVAR FREEZE SEGÚN NIVEL
        if (nivel === 2) {
          congelado = true;
          tiempoFreeze = 10;
        }

        if (nivel === 3) {
          congelado = true;
          tiempoFreeze = 20;
        }
      }

      // 🤫 BAJA NIVEL
      if (volume < 30 && nivel > 1) {
        tiempoSilencio += 0.016;

        contador.innerText = "Silencio: " + tiempoSilencio.toFixed(1) + "s";

        if (tiempoSilencio >= 20) {
          nivel--;
          tiempoSilencio = 0;
        }

      } else {
        tiempoSilencio = 0;
        contador.innerText = "Silencio: 0s";
      }

      // 🎭 VISUAL
      if (nivel === 1) {
        frog.src = "rana1.png";
        msg.innerText = "Silencio 😊";

      } else if (nivel === 2) {
        frog.src = "rana2.png";
        msg.innerText = "Cuidado 👀";

      } else if (nivel === 3) {
        frog.src = "rana3.png";
        msg.innerText = "Se va a arrancar 😰";

      } else if (nivel === 4) {
        frog.src = "rana4.png";
        msg.innerText = "💀 Se fue...";

        if (!sonidoYa) {
          croacSound.play();
          sonidoYa = true;
        }

        jugando = false;
        benitoBtn.style.display = "block";
      }

      requestAnimationFrame(update);
    }

    update();

    // 🚨 BOTÓN BENITO (2 MINUTOS)
    benitoBtn.onclick = function() {
      msg.innerText = "🚨 Benito viene en camino...";

      let tiempo = 120;

      let intervalo = setInterval(() => {
        contador.innerText = "Llegada en: " + tiempo + "s";
        tiempo--;

        if (tiempo <= 0) {
          clearInterval(intervalo);
          msg.innerText = "💀 Benito llegó...";
        }

      }, 1000);
    };

  })
  .catch(function(err) {
    alert("Permite el micrófono");
    console.log(err);
  });

};
</script>

</body>
</html>
