<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ruidómetro Rana 🐸</title>
  <style>
    body { text-align: center; font-family: Arial; background: #e8f5e9; }
    #frog {
      width: 220px;
      transition: opacity 0.4s ease;
    }
    #msg { font-size: 20px; font-weight: bold; }
    #tachometer-wrap { display: inline-block; margin: 10px auto; }
    #pulso {
      width: 120px; height: 120px;
      border-radius: 50%;
      margin: 10px auto;
      background: #4caf50;
      box-shadow: 0 0 20px #4caf50;
      transition: transform 0.1s ease, background 0.2s ease, box-shadow 0.2s ease;
    }
    #sensi-wrap { margin: 8px auto; width: 300px; }
    #sensi-wrap label { font-size: 14px; color: #5d4037; font-weight: bold; }
    #sensiSlider { width: 100%; accent-color: #8d6e63; }
    #sensi-info { font-size: 13px; color: #795548; }
  </style>
</head>
<body>
  <h1>🐸 Protege a la rana</h1>
  <button id="startBtn">Iniciar</button><br><br>
  <img id="frog" src=""><br>
  <div id="tachometer-wrap">
    <div id="pulso"></div>
  </div>
  <div id="sensi-wrap">
    <label for="sensiSlider">🎚️ Sensibilidad del micrófono</label><br>
    <input type="range" id="sensiSlider" min="10" max="90" value="70">
    <div id="sensi-info">
      Umbral: <span id="sensiVal">70</span> — Ambiente: <span id="ambienteLabel">Normal</span>
    </div>
  </div>
  <p id="msg">Presiona iniciar</p>
  <h2 id="contador">Silencio: 0s</h2>
  <button id="benitoBtn" style="display:none;">🚨 Llamar a Benito</button>
  <audio id="croac" src="croac.mp3"></audio>

  <script>
    // ── CÍRCULO DE PULSO ───────────────────────────────────────
    const pulso = document.getElementById("pulso");

    function drawTacho(volume) {
      const v = Math.min(Math.max(volume, 0), 100);
      const scale = 1 + (v / 100) * 0.5;
      let color, shadow;
      if (v < 33) {
        color = "#4caf50"; shadow = "#4caf50";
      } else if (v < 66) {
        const t = (v - 33) / 33;
        color = `rgb(${Math.round(76 + t * 179)}, ${Math.round(175 - t * 55)}, 50)`;
        shadow = color;
      } else {
        color = "#f44336"; shadow = "#f44336";
      }
      pulso.style.transform = `scale(${scale})`;
      pulso.style.background = color;
      pulso.style.boxShadow = `0 0 ${20 + v * 0.4}px ${shadow}`;
    }

    drawTacho(0);

    // ── SKINS ──────────────────────────────────────────────────
    const skins = [
      [
        "Rana1 skin 1 - fase 1.png",
        "Rana1 skin 1 - fase 2.png",
        "Rana1 skin 1 - fase 3.png",
        "Rana1 skin 1 -fase 4.png"
      ],
      [
        "Rana2 skin 2 - fase 1.png",
        "Rana2 skin 2 - fase 2.png",
        "Rana2 skin 2 - fase 3.png",
        "Rana2 skin 2 - fase 4.png"
      ],
      [
        "Rana3 skin 3 - fase 1.png",
        "Rana3 skin 3 - fase 2.png",
        "Rana3 skin 3 - fase 3.png",
        "Rana3 skin 3 - fase 4.png"
      ],
      [
        "Rana4 skin 4 - fase 1.png",
        "Rana4 skin 4 - fase 2.png",
        "Rana4 skin 4 - fase 3.png",
        "Rana4 skin 4 - fase 4.png"
      ]
    ];

    let skinActual = null;

    function elegirSkinAleatoria() {
      const opciones = skins.filter((_, i) => i !== skinActual);
      const idx = Math.floor(Math.random() * opciones.length);
      skinActual = skins.indexOf(opciones[idx]);
      return skins[skinActual];
    }

    function triggerSplash() {
      document.getElementById("frog").style.opacity = "0.3";
    }

    // ── SENSIBILIDAD ───────────────────────────────────────────
    const slider = document.getElementById("sensiSlider");
    const sensiVal = document.getElementById("sensiVal");
    const ambienteLabel = document.getElementById("ambienteLabel");
    let umbral = 70;

    slider.oninput = function () {
      umbral = parseInt(this.value);
      sensiVal.innerText = umbral;
      if (umbral <= 30) ambienteLabel.innerText = "Muy silencioso";
      else if (umbral <= 50) ambienteLabel.innerText = "Tranquilo";
      else if (umbral <= 70) ambienteLabel.innerText = "Normal";
      else ambienteLabel.innerText = "Ruidoso";
    };

    // ── LÓGICA PRINCIPAL ───────────────────────────────────────
    let streamActivo = null;
    let jugandoGlobal = false;

    document.getElementById("startBtn").onclick = function () {
      if (jugandoGlobal) {
        jugandoGlobal = false;
        if (streamActivo) { streamActivo.getTracks().forEach(t => t.stop()); streamActivo = null; }
        document.getElementById("startBtn").innerText = "Iniciar";
        document.getElementById("msg").innerText = "Presiona iniciar";
        document.getElementById("contador").innerText = "Silencio: 0s";
        document.getElementById("frog").src = "";
        document.getElementById("frog").style.opacity = "1";
        document.getElementById("benitoBtn").style.display = "none";
        drawTacho(0);
        return;
      }

      navigator.mediaDevices.getUserMedia({ audio: true }).then(function (stream) {
        streamActivo = stream;
        jugandoGlobal = true;
        document.getElementById("startBtn").innerText = "😴 Descansar";

        const skin = elegirSkinAleatoria();

        const audioContext = new AudioContext();
        const mic = audioContext.createMediaStreamSource(stream);
        const analyser = audioContext.createAnalyser();
        mic.connect(analyser);
        const data = new Uint8Array(analyser.frequencyBinCount);

        const frog = document.getElementById("frog");
        const msg = document.getElementById("msg");
        const croacSound = document.getElementById("croac");
        const contador = document.getElementById("contador");
        const benitoBtn = document.getElementById("benitoBtn");

        let nivel = 1;
        let tiempoSilencio = 0;
        let jugando = true;
        let sonidoYa = false;

        // fase 2 → 1: 10s | fase 3 → 1: 15s
        const tiempoParaCalmar = { 2: 10, 3: 15 };

        function update() {
          if (!jugandoGlobal) return;
          analyser.getByteFrequencyData(data);
          let volume = data.reduce((a, b) => a + b) / data.length;
          drawTacho(volume);

          if (!jugando) { requestAnimationFrame(update); return; }

          const umbralBajo = umbral * 0.43;

          if (volume > umbral && nivel < 3) {
            nivel++;
            tiempoSilencio = 0;
          }

          if (volume < umbralBajo && nivel > 1) {
            tiempoSilencio += 0.016;
            const necesario = tiempoParaCalmar[nivel] || 10;
            contador.innerText = "🤫 Silencio: " + tiempoSilencio.toFixed(1) + "s / " + necesario + "s";
            if (tiempoSilencio >= necesario) {
              nivel = 1;
              tiempoSilencio = 0;
            }
          } else if (nivel > 1) {
            tiempoSilencio = 0;
            contador.innerText = "🔊 Silencia el ruido para calmar la rana";
          } else {
            tiempoSilencio = 0;
            contador.innerText = "Silencio: 0s";
          }

          if (nivel === 1) { frog.src = skin[0]; msg.innerText = "Silencio 😊"; }
          else if (nivel === 2) { frog.src = skin[1]; msg.innerText = "Cuidado 👀 — 10s de silencio"; }
          else if (nivel === 3) {
            frog.src = skin[3];
            msg.innerText = "🐸 ¡Se escapó!";
            if (!sonidoYa) { croacSound.play(); sonidoYa = true; triggerSplash(); }
            jugando = false;
            benitoBtn.style.display = "block";
          }

          requestAnimationFrame(update);
        }

        update();

        benitoBtn.onclick = function () {
          benitoBtn.style.display = "none";
          frog.src = skin[2];
          msg.innerText = "🚨 Benito viene en camino...";
          let tiempo = 120;
          let intervalo = setInterval(() => {
            contador.innerText = "🔍 Buscando... " + tiempo + "s";
            tiempo--;
            if (tiempo <= 0) {
              clearInterval(intervalo);
              nivel = 1;
              tiempoSilencio = 0;
              jugando = true;
              sonidoYa = false;
              frog.src = skin[0];
              frog.style.opacity = "1";
              msg.innerText = "🐸 Benito la trajo de vuelta. Silencio 😊";
              contador.innerText = "Silencio: 0s";
              update();
            }
          }, 1000);
        };

      }).catch(function (err) {
        alert("Permite el micrófono");
        console.log(err);
      });
    };
  </script>
</body>
</html>
