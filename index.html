<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ruidometro Rana</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #e8f5e9;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      gap: 12px;
    }
    h1 { font-size: 22px; color: #2e7d32; }
    #frog { width: 240px; height: 240px; object-fit: contain; transition: opacity 0.4s ease; }
    #pulso {
      width: 80px; height: 80px; border-radius: 50%;
      background: #4caf50; box-shadow: 0 0 16px #4caf50;
      transition: transform 0.1s ease, background 0.2s ease, box-shadow 0.2s ease;
    }
    #msg { font-size: 18px; font-weight: bold; color: #333; min-height: 28px; }
    #contador { font-size: 16px; color: #555; min-height: 24px; }
    #sensi-wrap {
      width: 280px; background: #fff; border-radius: 12px;
      padding: 12px 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    #sensi-wrap label { font-size: 13px; color: #5d4037; font-weight: bold; }
    #sensiSlider { width: 100%; accent-color: #66bb6a; margin: 6px 0 2px; }
    #sensi-info { font-size: 12px; color: #795548; }
    button {
      padding: 10px 24px; border: none; border-radius: 24px;
      font-size: 15px; cursor: pointer; font-weight: bold;
    }
    #startBtn { background: #66bb6a; color: white; }
    #startBtn:hover { background: #43a047; }
    #benitoBtn { background: #ef5350; color: white; display: none; }
    #benitoBtn:hover { background: #c62828; }
  </style>
</head>
<body>
  <h1>Protege a la rana</h1>
  <img id="frog" src="rana1.png" alt="rana">
  <div id="pulso"></div>
  <p id="msg">Presiona iniciar</p>
  <p id="contador"></p>
  <div id="sensi-wrap">
    <label for="sensiSlider">Sensibilidad del microfono</label>
    <input type="range" id="sensiSlider" min="10" max="90" value="50">
    <div id="sensi-info">Ambiente: <span id="ambienteLabel">Normal</span></div>
  </div>
  <button id="startBtn">Iniciar</button>
  <button id="benitoBtn">Llamar a Benito</button>
  <audio id="croac" src="croac.mp3"></audio>

  <script>
    const pulso         = document.getElementById("pulso");
    const frog          = document.getElementById("frog");
    const msg           = document.getElementById("msg");
    const contador      = document.getElementById("contador");
    const benitoBtn     = document.getElementById("benitoBtn");
    const startBtn      = document.getElementById("startBtn");
    const croac         = document.getElementById("croac");
    const slider        = document.getElementById("sensiSlider");
    const ambienteLabel = document.getElementById("ambienteLabel");

    let umbral = 50;

    slider.oninput = function () {
      umbral = parseInt(this.value);
      if (umbral <= 25)      ambienteLabel.innerText = "Muy silencioso";
      else if (umbral <= 45) ambienteLabel.innerText = "Tranquilo";
      else if (umbral <= 65) ambienteLabel.innerText = "Normal";
      else                   ambienteLabel.innerText = "Ruidoso";
    };

    function updatePulso(v) {
      v = Math.min(100, Math.max(0, v));
      const scale = 1 + (v / 100) * 0.6;
      let color;
      if (v < 33) color = "#4caf50";
      else if (v < 66) {
        const t = (v - 33) / 33;
        color = "rgb(" + Math.round(76 + t*179) + "," + Math.round(175 - t*55) + ",50)";
      } else color = "#f44336";
      pulso.style.transform = "scale(" + scale + ")";
      pulso.style.background = color;
      pulso.style.boxShadow = "0 0 " + (16 + v * 0.3) + "px " + color;
    }

    let streamActivo = null;
    let jugandoGlobal = false;

    startBtn.onclick = function () {
      if (jugandoGlobal) {
        jugandoGlobal = false;
        if (streamActivo) { streamActivo.getTracks().forEach(t => t.stop()); streamActivo = null; }
        startBtn.innerText = "Iniciar";
        msg.innerText = "Presiona iniciar";
        contador.innerText = "";
        frog.src = "rana1.png";
        frog.style.opacity = "1";
        benitoBtn.style.display = "none";
        updatePulso(0);
        return;
      }

      navigator.mediaDevices.getUserMedia({ audio: true }).then(function (stream) {
        streamActivo = stream;
        jugandoGlobal = true;
        startBtn.innerText = "Detener";

        const audioCtx = new AudioContext();
        const mic = audioCtx.createMediaStreamSource(stream);
        const analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        mic.connect(analyser);
        const data = new Uint8Array(analyser.frequencyBinCount);

        let fase = 1;
        let tiempoSilencio = 0;
        let tiempoRuido = 0;
        let escapeTimer = 0;
        let jugando = true;
        let sonidoYa = false;
        let benitoActivo = false;
        let tiempoBenito = 0;
        let benitoInterval = null;
        let penalizando = false;

        function getVolume() {
          analyser.getByteFrequencyData(data);
          let sum = 0;
          for (let i = 0; i < data.length; i++) sum += data[i] * data[i];
          return Math.min(100, Math.sqrt(sum / data.length) * 2.5);
        }

        benitoBtn.onclick = function () {
          benitoBtn.style.display = "none";
          benitoActivo = true;
          tiempoBenito = 120;
          frog.src = "rana3.png";
          frog.style.opacity = "1";
          msg.innerText = "Benito buscando a la rana...";
          contador.innerText = "Llegada en: 120s";

          benitoInterval = setInterval(function () {
            const vol = getVolume();
            if (vol > 50 && !penalizando) {
              penalizando = true;
              tiempoBenito += 30;
              msg.innerText = "Ruido! +30s a la espera";
              setTimeout(function () {
                penalizando = false;
                if (benitoActivo) msg.innerText = "Benito buscando a la rana...";
              }, 2000);
            }
            tiempoBenito--;
            contador.innerText = "Llegada en: " + tiempoBenito + "s";
            if (tiempoBenito <= 0) {
              clearInterval(benitoInterval);
              benitoActivo = false;
              fase = 1;
              tiempoSilencio = 0;
              escapeTimer = 0;
              jugando = true;
              sonidoYa = false;
              frog.src = "rana1.png";
              frog.style.opacity = "1";
              msg.innerText = "Benito la trajo de vuelta";
              contador.innerText = "";
              update();
            }
          }, 1000);
        };

        function update() {
          if (!jugandoGlobal || benitoActivo) return;

          const vol = getVolume();
          updatePulso(vol);

          if (!jugando) { requestAnimationFrame(update); return; }

          const dt = 0.016;
          const UMBRAL_RUIDO    = 33;
          const UMBRAL_SILENCIO = 15;
          const T_SUBIR  = 10;
          const T_BAJAR  = 10;
          const T_ESCAPE = 15;

          if (fase < 4) {
            const hayRuido    = vol > UMBRAL_RUIDO;
            const haySilencio = vol <= UMBRAL_SILENCIO;

            if (hayRuido) {
              tiempoSilencio = 0;
              tiempoRuido += dt;
              if (fase === 1 && tiempoRuido >= T_SUBIR) { fase = 2; tiempoRuido = 0; }
              if (fase === 2 && tiempoRuido >= T_SUBIR) { fase = 3; tiempoRuido = 0; }
              if (fase === 3) {
                escapeTimer += dt;
                if (escapeTimer >= T_ESCAPE) { fase = 4; }
              }
            } else if (haySilencio) {
              tiempoRuido = 0;
              escapeTimer = 0;
              if (fase > 1) {
                tiempoSilencio += dt;
                if (tiempoSilencio >= T_BAJAR) { fase--; tiempoSilencio = 0; }
              }
            } else {
              tiempoRuido = 0;
              tiempoSilencio = 0;
              escapeTimer = 0;
            }
          }

          if (fase === 1) {
            contador.innerText = "";
          } else if (hayRuido && tiempoRuido > 0) {
            contador.innerText = "Ruido: " + tiempoRuido.toFixed(1) + "s / " + T_SUBIR + "s";
          } else if (fase > 1 && tiempoSilencio > 0) {
            contador.innerText = "Silencio: " + tiempoSilencio.toFixed(1) + "s / " + T_BAJAR + "s";
          } else if (fase === 3 && escapeTimer > 0) {
            contador.innerText = "Escapando en: " + (T_ESCAPE - escapeTimer).toFixed(1) + "s";
          } else {
            contador.innerText = fase > 1 ? "Baja el ruido para calmar la rana" : "";
          }

          if (fase === 1) {
            frog.src = "rana1.png"; frog.style.opacity = "1";
            msg.innerText = "Todo tranquilo";
          } else if (fase === 2) {
            frog.src = "rana2.png"; frog.style.opacity = "1";
            msg.innerText = "La rana esta alerta";
          } else if (fase === 3) {
            frog.src = "rana3.png"; frog.style.opacity = "1";
            msg.innerText = "La rana quiere irse!";
          } else if (fase === 4) {
            frog.src = "rana4.png"; frog.style.opacity = "0.5";
            msg.innerText = "La rana se escapo!";
            if (!sonidoYa) { croac.play(); sonidoYa = true; }
            jugando = false;
            contador.innerText = "";
            benitoBtn.style.display = "block";
          }

          requestAnimationFrame(update);
        }

        update();

      }).catch(function () { alert("Permite el microfono"); });
    };
  </script>
</body>
</html>
