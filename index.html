<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ruidómetro Rana 🐸</title>

<style>
  body {
    text-align: center;
    font-family: Arial;
    background: #e8f5e9;
  }

  #frog {
    width: 150px;
    position: relative;
    top: 0;
    transition: all 0.3s ease;
  }

  #bar {
    width: 300px;
    height: 20px;
    background: lightgray;
    margin: 20px auto;
    border-radius: 10px;
    overflow: hidden;
  }

  #level {
    height: 100%;
    width: 0%;
    background: green;
    transition: width 0.1s;
  }

  #msg {
    font-size: 20px;
    font-weight: bold;
  }

  button {
    padding: 10px 20px;
    font-size: 16px;
    margin-top: 10px;
    cursor: pointer;
  }
</style>
</head>

<body>

<h1>🐸 Protege a la rana</h1>

<button id="startBtn">Iniciar</button>

<br><br>

<img id="frog" src="rana1.png">

<div id="bar">
  <div id="level"></div>
</div>

<p id="msg">Presiona iniciar</p>

<h2 id="contador">Silencio: 0s</h2>

<button id="benitoBtn" style="display:none;">🚨 Llamar a Benito</button>

<audio id="croac" src="croac.mp3"></audio>

<script>

document.getElementById("startBtn").addEventListener("click", startApp);

function startApp() {

  navigator.mediaDevices.getUserMedia({ audio: true })
  .then(stream => {

    const audioContext = new AudioContext();
    const mic = audioContext.createMediaStreamSource(stream);
    const analyser = audioContext.createAnalyser();
    mic.connect(analyser);

    const data = new Uint8Array(analyser.frequencyBinCount);

    let frog = document.getElementById("frog");
    let levelBar = document.getElementById("level");
    let msg = document.getElementById("msg");
    let croacSound = document.getElementById("croac");
    let contador = document.getElementById("contador");
    let benitoBtn = document.getElementById("benitoBtn");

    let alreadyPlayed = false;

    // 🔥 SISTEMA
    let nivel = 1;
    let tiempoSilencio = 0;
    let jugando = true;

    function update() {
      analyser.getByteFrequencyData(data);
      let volume = data.reduce((a,b) => a+b) / data.length;

      let percent = Math.min(volume, 100);
      levelBar.style.width = percent + "%";

      if (!jugando) return;

      // 🔊 SUBE NIVEL
      if (volume > 70 && nivel < 4) {
        nivel++;
        tiempoSilencio = 0;
      }

      // 🤫 BAJA NIVEL CON SILENCIO
      if (volume < 30 && nivel > 1) {
        tiempoSilencio += 0.016;

        contador.innerText = "Silencio: " + tiempoSilencio.toFixed(1) + "s";

        if (tiempoSilencio >= 20) {
          nivel--;
          tiempoSilencio = 0;
        }

      } else {
        tiempoSilencio = 0;
        contador.innerText = "Silencio: 0s";
      }

      // 🎭 ESTADOS VISUALES
      if (nivel === 1) {
        frog.src = "rana1.png";
        frog.style.top = "0px";
        msg.innerText = "Silencio 😊";
        levelBar.style.background = "green";

      } else if (nivel === 2) {
        frog.src = "rana2.png";
        frog.style.top = "-20px";
        msg.innerText = "Cuidado 👀";
        levelBar.style.background = "yellow";

      } else if (nivel === 3) {
        frog.src = "rana3.png";
        frog.style.top = "-80px";
        msg.innerText = "Se va a arrancar 😰";
        levelBar.style.background = "orange";

      } else if (nivel === 4) {
        frog.src = "rana4.png";
        frog.style.top = "-200px";
        msg.innerText = "💀 Se fue...";
        levelBar.style.background = "red";

        if (!alreadyPlayed) {
          croacSound.play();
          alreadyPlayed = true;
        }

        jugando = false;
        benitoBtn.style.display = "inline-block";
      }

      requestAnimationFrame(update);
    }

    update();

    // 🚨 BOTÓN BENITO
    benitoBtn.onclick = () => {
      alert("🚨 Benito ha sido llamado 😈");
      location.reload();
    };

  })
  .catch(err => {
    alert("Debes permitir el micrófono");
    console.error(err);
  });
}

</script>

</body>
</html>
